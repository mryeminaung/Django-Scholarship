{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Devfolio{% endblock %}</title>
  <!-- load static css files -->
  <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}">
  <!-- bootstrap 5 CDN link -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- fontawesome CDN link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- google font: Roboto Slab -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900" rel="stylesheet">
</head>

<body class="d-flex flex-column h-100">
  <!-- main navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom border-light-subtle sticky-top shadow-sm py-3">
    <div class="container">
      <!-- Brand Logo -->
      <a class="navbar-brand fw-bold text-dark fs-4" href="/">
        <i class="fa-solid fa-terminal"></i>YeMinAung<span class="text-primary">.dev</span>
      </a>

      <!-- Responsive Toggle Button -->
      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navbar Links Layout -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <!-- ms-auto cleanly pushes the menu choices to the right-hand side -->
        <ul class="navbar-nav ms-auto gap-2 text-center text-lg-start mt-3 mt-lg-0">

          <!-- Home Link -->
          <li class="nav-item">
            <a class="nav-link px-3 fw-medium {% if request.path == '/' %}active text-primary fw-semibold{% endif %}"
              href="/">Home</a>
          </li>

          <!-- About Link -->
          <li class="nav-item">
            <a class="nav-link px-3 fw-medium {% if request.path == '/about/' %}active text-primary fw-semibold{% endif %}"
              href="/about/">About</a>
          </li>

          <!-- Project Link -->
          <li class="nav-item">
            <a class="nav-link px-3 fw-medium {% if request.path == '/projects/' %}active text-primary fw-semibold{% endif %}"
              href="/projects/">Projects</a>
          </li>

          <!-- Contact Link -->
          <li class="nav-item">
            <a class="nav-link px-3 fw-medium {% if request.path == '/contact/' %}active text-primary fw-semibold{% endif %}"
              href="/contact/">Contact</a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- all pages will be rendered here -->
  <main class="container py-5 flex-grow-1">
    {% block main %}
    {% endblock %}
  </main>

  <!-- main footer -->
  <footer class="bg-light border-top border-light-subtle py-4 mt-auto">
    <div class="container">
      <div class="row align-items-center justify-content-between text-center text-md-start">

        <!-- Left Side: Copyright & Institutional Info -->
        <div class="col-md-6 mb-3 mb-md-0">
          <p class="mb-0 text-muted small">
            &copy; {% now "Y" %} Ye Min Aung
          </p>
        </div>

        <!-- Right Side: Quick Icon Channels -->
        <div class="col-md-6 text-center text-md-end">
          <div class="d-flex justify-content-center justify-content-md-end gap-3 fs-5">
            <a href="https://github.com/mryeminaung" target="_blank"
              class="text-decoration-none text-secondary link-dark" title="GitHub">
              <i class="fa-brands fa-github fs-4"></i><span class="d-md-none small fs-6 ms-1">GitHub</span>
            </a>
            <a href="https://linkedin.com/in/mryeminaung" target="_blank"
              class="text-decoration-none text-secondary link-primary" title="LinkedIn">
              <i class="fa-brands fa-linkedin-in fs-4"></i><span class="d-md-none small fs-6 ms-1">LinkedIn</span>
            </a>
            <a href="mailto:yeminaung.dev@gmail.com" class="text-decoration-none text-secondary link-danger"
              title="Email">
              <i class="fa-solid fa-envelope fs-4"></i><span class="d-md-none small fs-6 ms-1">Email</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <!-- bootstrap CDN link -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
